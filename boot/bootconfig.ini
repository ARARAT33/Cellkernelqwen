[boot]
# Boot mode: efi, bios, multiboot
mode = efi

# Secure boot settings
secure_boot = enabled
signature_algorithm = ed25519
public_key_hash = sha256

# TPM settings
tpm_enabled = true
tpm_version = 2.0
pcr_kernel = 11
pcr_initrd = 12
pcr_cmdline = 13

# Anti-rollback protection
anti_rollback = enabled
min_version = 1

[kernel]
# Kernel image path
image = /boot/cellkernel.bin

# Command line arguments
cmdline = quiet log_level=3 debug_cell=init

# Memory settings
aslr = full
kernel_aslr = enabled
smep = enabled
smap = enabled
kpti = auto

# Scheduler settings
scheduler = o1
cpu_affinity = dynamic
realtime_priority = enabled

[cells]
# Initial cell configuration
init_cell = /system/init.cell
max_cells = 256
cell_memory_limit = 512M

# IPC settings
ipc_buffer_size = 64K
ipc_rate_limit = 1000
ipc_quota_per_cell = 10M

[drivers]
# Driver loading policy
driver_policy = signed_only
iommu_required = true
user_space_drivers = preferred

# Built-in drivers
builtin = serial,keyboard,nvme,ehci

[security]
# LSM hooks
lsm = capability,acl,integrity

# Sandbox settings
sandbox_default = strict
seccomp_available = true
landlock_available = true

# Crypto settings
crypto_backend = hardware
rng_source = rdseed,hwrng
post_quantum = kyber768,dilithium3

[logging]
# Log levels: 0=panic, 1=fatal, 2=error, 3=warn, 4=info, 5=debug, 6=trace
default_level = 3
serial_console = true
memory_log = enabled
log_size = 4M

[debug]
# Debug options (disabled in production)
kdb_enabled = false
kdb_password = changeme
gdb_stub = disabled
early_printk = true
