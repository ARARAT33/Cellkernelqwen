name: Build CellKernel OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools & Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y make nasm grub-pc-bin xorriso gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu python3

    - name: Create x86_64-elf Symlinks
      run: |
        sudo ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-elf-gcc
        sudo ln -sf /usr/bin/x86_64-linux-gnu-ld /usr/bin/x86_64-elf-ld
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objcopy /usr/bin/x86_64-elf-objcopy
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objdump /usr/bin/x86_64-elf-objdump
        sudo ln -sf /usr/bin/x86_64-linux-gnu-as /usr/bin/x86_64-elf-as
        sudo ln -sf /usr/bin/x86_64-linux-gnu-strip /usr/bin/x86_64-elf-strip

    - name: Automatic Source Code Fixes (Headers + Inline Assembly)
      run: |
        python3 << 'EOF'
        import re
        import os

        file_path = "kernel/core/interrupts.c"
        if not os.path.exists(file_path):
            print(f"[!] {file_path} not found, skipping fixes")
            exit(0)

        with open(file_path, "r") as f:
            content = f.read()

        # 1. Add missing #include <string.h> (for memset)
        if "memset" in content and '#include <string.h>' not in content:
            content = content.replace('#include "../include/kernel.h"', '#include "../include/kernel.h"\n#include <string.h>')
            print("[+] Added #include <string.h>")

        # 2. Add missing #include <stdint.h> (for uint64_t)
        if 'uint64_t' in content and '#include <stdint.h>' not in content:
            # Insert after existing includes
            lines = content.split('\n')
            insert_pos = 0
            for i, line in enumerate(lines):
                if line.startswith('#include'):
                    insert_pos = i + 1
            lines.insert(insert_pos, '#include <stdint.h>')
            content = '\n'.join(lines)
            print("[+] Added #include <stdint.h>")

        # 3. Add forward declarations for serial functions if missing
        if 'serial_print' in content and 'void serial_print' not in content[:1000]:
            serial_decls = '''
            // Forward declarations for serial I/O
            void serial_print(const char *str);
            void serial_println(const char *str);
            void serial_print_hex(uint64_t value);
            '''
            lines = content.split('\n')
            insert_pos = 0
            for i, line in enumerate(lines):
                if line.startswith('#include'):
                    insert_pos = i + 1
                elif line.strip().startswith('//') or line.strip().startswith('/*'):
                    continue
                else:
                    break
            lines.insert(insert_pos, serial_decls)
            content = '\n'.join(lines)
            print("[+] Added serial_* function declarations")

        # 4. Fix inline assembly: 'out' -> 'outb' and double % signs
        def fix_asm(match):
            asm_block = match.group(0)
            # Replace 'out' with 'outb' (assuming 8-bit I/O)
            fixed = re.sub(r'\bout\b', 'outb', asm_block)
            # Double % for GCC
            fixed = re.sub(r'(?<!%)%([a-zA-Z][a-zA-Z0-9_]*)', r'%%\1', fixed)
            return fixed

        # Match __asm__ volatile(...); blocks (multi-line allowed)
        pattern = r'__asm__\s+volatile\s*\(([^;]*?)\)\s*;'
        new_content = re.sub(pattern, fix_asm, content, flags=re.DOTALL)

        if new_content != content:
            with open(file_path, "w") as f:
                f.write(new_content)
            print("[+] Successfully patched kernel/core/interrupts.c")
        else:
            print("[!] No changes applied to interrupts.c")
        EOF

    - name: Compile CellKernel OS
      run: |
        make clean
        # -Wno-unused-function ignores unused functions (like default_exception_handler)
        # -Wno-unused-parameter ignores unused parameters (ed25519_verify)
        make CFLAGS="-Wall -Wextra -Wno-error -std=c11 -ffreestanding -fno-stack-protector -fno-builtin -fno-pie -O2 -g -Ikernel/include -march=x86-64 -mno-red-zone -mno-mmx -mno-sse -mno-sse2 -Wno-unused-function -Wno-unused-parameter -Wno-implicit-function-declaration"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cellkernel-build-output
        path: build/
