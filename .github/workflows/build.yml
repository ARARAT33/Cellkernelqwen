name: Build CellKernel ISO

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin mtools syslinux isolinux

    - name: Prepare ISO Structure with Python Environment
      run: |
        mkdir -p iso_root/boot/grub
        mkdir -p iso_root/etc
        
        # 1. Փնտրում և պատճենում ենք բոլոր Python ֆայլերը
        echo "Searching for Python files..."
        find . -name "*.py" -not -path "*/.*" -exec cp {} iso_root/ \;
        
        echo "Files copied to ISO root:"
        ls -la iso_root/

        # 2. Ստեղծում ենք GRUB-ի ճիշտ կոնֆիգուրացիան
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set default=0
        set timeout=5

        menuentry "CellKernel OS (Qwen Python Version)" {
            linux /boot/vmlinuz quiet console=ttyS0
            initrd /boot/initrd.img
            boot
        }
        EOF

    - name: Copy Safe System Kernel
      run: |
        # Վերցնում ենք GitHub-ի սերվերի վրա արդեն ԻՍԿԱԿԱՆՈՒՄ ԳՈՅՈՒԹՅՈՒՆ ՈՒՆԵՑՈՂ պաշտոնական Linux կորիզը
        # Սա ապահովագրում է մեզ կիսատ ներբեռնումներից
        cp /boot/vmlinuz-$(uname -r) iso_root/boot/vmlinuz
        
        # Ստեղծում ենք ժամանակավոր մինիմալ initrd, որ համակարգը բեռնվի
        touch iso_root/boot/initrd.img 
        
        # Ստուգում ենք կորիզի չափսը, որ համոզվենք՝ դատարկ չէ
        ls -lh iso_root/boot/vmlinuz

    - name: Generate ISO File
      run: |
        grub-mkrescue -o cellkernel.iso iso_root

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellKernel-ISO-Image
        path: cellkernel.iso
