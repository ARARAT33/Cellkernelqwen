name: Build CellKernel ISO

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin mtools syslinux isolinux cpio busybox-static

    - name: Prepare ISO Structure
      run: |
        mkdir -p iso_root/boot/grub
        
        # 1. Ստեղծում ենք GRUB-ի կոնֆիգը
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set default=0
        set timeout=3

        menuentry "CellKernel OS (Qwen v86 Engine)" {
            linux /boot/vmlinuz quiet rw root=/dev/ram0 rdinit=/init console=tty1
            initrd /boot/initrd.img
            boot
        }
        EOF

    - name: Fetch Alpine Kernel
      run: |
        # Ներբեռնում ենք v86-ի համար ամենահուսալի թեթև կորիզը
        wget -O iso_root/boot/vmlinuz https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/netboot/vmlinuz-virt

    - name: Build Custom Initramfs with CellKernel
      run: |
        # Ստեղծում ենք ժամանակավոր թղթապանակ RAM-դիսկի կառուցվածքի համար
        mkdir initrd_root
        cd initrd_root
        
        # Ստեղծում ենք հիմնական Linux թղթապանակները
        mkdir -p bin sbin dev proc sys etc root
        
        # Պատճենում ենք համակարգում տեղադրված պաշտոնական static BusyBox-ը
        cp /bin/busybox bin/busybox
        chmod +x bin/busybox
        
        # Սարքում ենք հիմնական հրամանները BusyBox-ի միջոցով
        ./bin/busybox --install -s bin/
        
        # Պատճենում ենք քո Python ֆայլերը ռեպոզիտորիայից այս միջավայրի մեջ
        find ../ -name "*.py" -not -path "*/.*" -exec cp {} ./root/ \;
        
        # Ստեղծում ենք գլխավոր /init սկրիպտը
        cat << 'EOF' > init
        #!/bin/sh
        # Միացնում ենք համակարգային ֆայլերը
        mount -t proc proc /proc
        mount -t sysfs sysfs /sys
        
        clear
        echo "========================================"
        echo "       Welcome to CellKernel OS         "
        echo "========================================"
        echo "Loading Qwen micro-logic architecture..."
        echo ""
        
        if [ -f /root/cellkernel.py ]; then
            echo "Executing cellkernel.py..."
            echo "----------------------------------------"
            cat /root/cellkernel.py | head -n 30
            echo "----------------------------------------"
        fi
        
        # Բացում ենք ավտոնոմ տերմինալը
        exec /bin/sh
        EOF
        
        chmod +x init
        
        # Փաթեթավորում ենք որպես իրական initrd.img
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../iso_root/boot/initrd.img
        cd ..

    - name: Generate ISO File
      run: |
        grub-mkrescue -o cellkernel.iso iso_root

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellKernel-ISO-Image
        path: cellkernel.iso
