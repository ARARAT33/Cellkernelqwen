name: Build CellKernel ISO

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin mtools syslinux isolinux

    - name: Prepare ISO Structure with Python Environment
      run: |
        mkdir -p iso_root/boot/grub
        mkdir -p iso_root/etc
        
        # 1. Փնտրում և պատճենում ենք բոլոր Python ֆայլերը
        echo "Searching for Python files..."
        find . -name "*.py" -not -path "*/.*" -exec cp {} iso_root/ \;
        
        echo "Files copied to ISO root:"
        ls -la iso_root/

        # 2. Ստեղծում ենք GRUB-ի ճիշտ կոնֆիգուրացիան
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set default=0
        set timeout=5

        menuentry "CellKernel OS (Qwen Python Version)" {
            linux /boot/vmlinuz quiet console=ttyS0
            initrd /boot/initrd.img
            boot
        }
        EOF

    - name: Fetch Official Minimal Kernel and Initrd
      run: |
        # Ներբեռնում ենք Alpine Linux-ի պաշտոնական թեթև կորիզը (վստահելի հղումից)
        wget -O iso_root/boot/vmlinuz https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/netboot/vmlinuz-virt
        
        # Ներբեռնում ենք համապատասխան initrd-ն, որն արդեն ունի ներկառուցված Python-ի աջակցություն
        wget -O iso_root/boot/initrd.img https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/netboot/initramfs-virt
        
        # Ստուգում ենք, որ ֆայլերը դատարկ չեն
        ls -lh iso_root/boot/vmlinuz
        ls -lh iso_root/boot/initrd.img

    - name: Generate ISO File
      run: |
        grub-mkrescue -o cellkernel.iso iso_root

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellKernel-ISO-Image
        path: cellkernel.iso
