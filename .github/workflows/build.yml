name: Build CellKernel OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          make \
          nasm \
          grub-pc-bin \
          xorriso \
          gcc-x86-64-linux-gnu \
          binutils-x86-64-linux-gnu

    - name: Setup Cross-Compiler Symlinks
      run: |
        sudo ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-elf-gcc
        sudo ln -sf /usr/bin/x86_64-linux-gnu-ld /usr/bin/x86_64-elf-ld
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objcopy /usr/bin/x86_64-elf-objcopy
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objdump /usr/bin/x86_64-elf-objdump
        sudo ln -sf /usr/bin/x86_64-linux-gnu-as /usr/bin/x86_64-elf-as

    - name: Fix interrupt.c
      run: |
        cat > /tmp/fix.py << 'PYTHON'
        import re

        with open("kernel/core/interrupts.c", "r") as f:
            content = f.read()

        # Fix 1: Add missing headers
        if '#include <string.h>' not in content:
            content = content.replace(
                '#include "../include/kernel.h"',
                '#include "../include/kernel.h"\n#include <string.h>'
            )
        if '#include <stdint.h>' not in content and 'uint64_t' in content:
            lines = content.split('\n')
            for i, line in enumerate(lines):
                if line.startswith('#include'):
                    lines.insert(i + 1, '#include <stdint.h>')
                    break
            content = '\n'.join(lines)

        # Fix 2: Add serial declarations
        if 'serial_print' in content and 'void serial_print' not in content[:500]:
            decls = '''
        void serial_print(const char *str);
        void serial_println(const char *str);
        void serial_print_hex(unsigned long long value);
        '''
            lines = content.split('\n')
            for i, line in enumerate(lines):
                if line.startswith('#include'):
                    lines.insert(i + 1, decls)
                    break
            content = '\n'.join(lines)

        # Fix 3: Fix inline assembly (MOST IMPORTANT)
        # Change 'out' to 'outb' and '%reg' to '%%reg'
        def fix_asm(m):
            code = m.group(0)
            code = re.sub(r'\bout\b', 'outb', code)
            code = re.sub(r'(?<!%)%([a-z]{2,3}\b)', r'%%\1', code)
            code = re.sub(r'(?<!%)%([a-z]{1,2}[0-9]{1,2}\b)', r'%%\1', code)
            return code

        content = re.sub(
            r'__asm__\s+volatile\s*\([^;]+?\);',
            fix_asm,
            content,
            flags=re.DOTALL
        )

        with open("kernel/core/interrupts.c", "w") as f:
            f.write(content)

        print("✓ interrupts.c fixed")
        PYTHON
        
        python3 /tmp/fix.py

    - name: Build Kernel
      run: |
        make clean
        make CFLAGS="-std=c11 -ffreestanding -fno-stack-protector -fno-builtin -fno-pie -O2 -g -Ikernel/include -march=x86-64 -mno-red-zone -mno-mmx -mno-sse -mno-sse2 -Wall -Wextra -Wno-unused-function -Wno-unused-parameter -Wno-implicit-function-declaration"

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: cellkernel
        path: build/
