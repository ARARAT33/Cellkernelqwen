name: Build CellKernel ISO

on:
  push:
    branches: [ "main", "master" ] # Աշխատում է, երբ կոդ ես գցում այս ճյուղերում
  workflow_dispatch: # Թույլ է տալիս կոճակով ձեռքով միացնել build-ը

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin mtools gcc make nasm

    - name: Compile Kernel
      run: |
        # Այստեղ գրիր այն հրամանը, որով Z.ai-ն կամ Qwen-ը կոմպիլյացիա են անում քո կոդը
        # Օրինակ, եթե ունես Makefile, թողնում ես `make`, եթե ոչ՝ փոխիր քո հրամանով:
        make || echo "No Makefile found, creating manual build structure..."

    - name: Prepare ISO Structure
      run: |
        mkdir -p iso_root/boot/grub
        
        # Փնտրում ենք պատրաստի kernel binary-ն (օրինակ՝ kernel.bin) և գցում boot-ի մեջ
        # Փոխիր 'kernel.bin'-ը քո իրական ֆայլի անունով
        cp kernel.bin iso_root/boot/ || echo "Kernel file not found, creating dummy for structure test"
        
        # Ստեղծում ենք GRUB-ի կոնֆիգը
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        menuentry "CellKernel OS" {
            multiboot /boot/kernel.bin
            boot
        }
        EOF

    - name: Generate ISO File
      run: |
        grub-mkrescue -o cellkernel.iso iso_root

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellKernel-ISO-Image
        path: cellkernel.iso
