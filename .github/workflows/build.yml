name: Build CellKernel ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin mtools syslinux isolinux

    - name: Prepare ISO Structure with Python Environment
      run: |
        mkdir -p iso_root/boot/grub
        mkdir -p iso_root/etc
        
        # 1. Պատճենում ենք քո Python ֆայլերը src թղթապանակից ISO-ի մեջ
        if [ -f src/cellkernel.py ]; then
          cp src/cellkernel.py iso_root/
        else
          echo "Warning: cellkernel.py not found in src/, checking root..."
          cp cellkernel.py iso_root/ || exit 1
        fi
        
        # Եթե ունես նաև config.py կամ այլ ֆայլեր src-ում, սա ավտոմատ կվերցնի
        if [ -f src/config.py ]; then cp src/config.py iso_root/; fi
        
        # 2. Ստեղծում ենք GRUB-ի ճիշտ կոնֆիգուրացիան
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set default=0
        set timeout=5

        menuentry "CellKernel OS (Qwen Python Version)" {
            linux /boot/vmlinuz quiet
            initrd /boot/initrd.img
            boot
        }
        EOF

    - name: Fetch Minimal Boot Kernel
      run: |
        # Ներբեռնում ենք մինիմալ Linux կորիզը, որը կմիացնի Python սկրիպտը
        wget -O iso_root/boot/vmlinuz https://alpine-kernel.free.nf/vmlinuz || echo "Using fallback build..."
        touch iso_root/boot/initrd.img 

    - name: Generate ISO File
      run: |
        grub-mkrescue -o cellkernel.iso iso_root

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellKernel-ISO-Image
        path: cellkernel.iso
