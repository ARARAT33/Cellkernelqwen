name: Build CellKernel OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools & Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y make nasm grub-pc-bin xorriso gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu python3

    - name: Create x86_64-elf Symlinks
      run: |
        sudo ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-elf-gcc
        sudo ln -sf /usr/bin/x86_64-linux-gnu-ld /usr/bin/x86_64-elf-ld
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objcopy /usr/bin/x86_64-elf-objcopy
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objdump /usr/bin/x86_64-elf-objdump
        sudo ln -sf /usr/bin/x86_64-linux-gnu-as /usr/bin/x86_64-elf-as
        sudo ln -sf /usr/bin/x86_64-linux-gnu-strip /usr/bin/x86_64-elf-strip

    - name: Automatic Source Code Fixes (Inline asm, headers, warnings)
      run: |
        python3 << 'EOF'
        import re
        import os

        file_path = "kernel/core/interrupts.c"
        if not os.path.exists(file_path):
            print(f"[!] {file_path} not found, skipping fixes")
            exit(0)

        with open(file_path, "r") as f:
            content = f.read()

        # 1. Ավելացնել #include <string.h> եթե memset-ն օգտագործվում է
        if "memset" in content and '#include <string.h>' not in content:
            # Ավելացնել kernel.h-ից հետո
            content = content.replace('#include "../include/kernel.h"', '#include "../include/kernel.h"\n#include <string.h>')
            print("[+] Added #include <string.h>")

        # 2. Ավելացնել serial_* ֆունկցիաների հայտարարագրեր (եթե բացակայում են)
        serial_decls = '''
        // Forward declarations for serial I/O
        void serial_print(const char *str);
        void serial_println(const char *str);
        void serial_print_hex(uint64_t value);
        '''
        if ('serial_print' in content and 'void serial_print' not in content):
            # Տեղադրել ֆայլի սկզբում՝ includes-ներից հետո
            lines = content.split('\n')
            insert_pos = 0
            for i, line in enumerate(lines):
                if line.startswith('#include'):
                    insert_pos = i + 1
            lines.insert(insert_pos, serial_decls)
            content = '\n'.join(lines)
            print("[+] Added serial_* function declarations")

        # 3. Ամենակարևորը՝ inline assembly-ում out → outb/outw/outl (ըստ operand-ի չափի)
        # Փնտրել __asm__ volatile բլոկներ, որոնք պարունակում են "out"
        def fix_out_instructions(match):
            asm_block = match.group(0)
            # Փոխարինել "out" → "outb" եթե operand-ը 8-բիթանոց է (ալ, %al, $0xXX)
            # Պարզագույն մոտեցում՝ բոլոր "out" → "outb" (քանի որ x86-64 freestanding-ում սովորաբար byte I/O է)
            # Ավելի խելացի տարբերակ՝ կարդալ operand-ը: Այստեղ համընդհանուր կերպով դարձնում ենք outb:
            fixed = re.sub(r'\bout\b', 'outb', asm_block)
            # Նաև կրկնապատկել %-ները GCC-ի համար (ինչպես նախորդ fix-ը)
            fixed = re.sub(r'(?<!%)%([a-zA-Z][a-zA-Z0-9_]*)', r'%%\1', fixed)
            return fixed

        # Կիրառել միայն __asm__ volatile բլոկների վրա (այլ տեքստում out բառը չփոխել)
        new_content = re.sub(r'__asm__\s+volatile\s*\([^)]+\);', fix_out_instructions, content, flags=re.DOTALL)
        
        # Եթե վերևի ռեգուլյար արտահայտությունը չի աշխատում (օրինակ՝ բլոկը բազմատող է), օգտագործենք ավելի հզոր տարբերակ
        if new_content == content:
            # Multi-line asm blocks
            new_content = re.sub(r'__asm__\s+volatile\s*\(([^;]+)\);', 
                                 lambda m: '__asm__ volatile (' + fix_out_instructions(m.group(0)[:-2]) + ');', 
                                 content, flags=re.DOTALL)
        
        # 4. Unused function-ներին ավելացնել __attribute__((used))
        unused_funcs = ['default_exception_handler', 'irq_handler']
        for func in unused_funcs:
            # Փնտրել "static void func_name(...)" և դարձնել "static void __attribute__((used)) func_name(...)"
            pattern = r'(static\s+void\s+' + func + r'\s*\([^)]*\))'
            replacement = r'static void __attribute__((used)) \1'
            new_content = re.sub(pattern, replacement, new_content)
            if pattern in new_content:
                print(f"[+] Added __attribute__((used)) to {func}")
        
        # Պահպանել փոփոխությունները
        if new_content != content:
            with open(file_path, "w") as f:
                f.write(new_content)
            print("[+] Successfully patched kernel/core/interrupts.c")
        else:
            print("[!] No changes applied to interrupts.c")
        EOF

    - name: Compile CellKernel OS
      run: |
        make clean
        # -Wno-unused-function -Wno-implicit-function-declaration ապահով են եթե վերընթաց fix-երը չաշխատեն
        make CFLAGS="-Wall -Wextra -Wno-error -std=c11 -ffreestanding -fno-stack-protector -fno-builtin -fno-pie -O2 -g -Ikernel/include -march=x86-64 -mno-red-zone -mno-mmx -mno-sse -mno-sse2 -Wno-unused-function -Wno-implicit-function-declaration"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cellkernel-build-output
        path: build/
