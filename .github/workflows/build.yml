name: Build CellKernel OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools & Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y make nasm grub-pc-bin xorriso gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu

    - name: Create x86_64-elf Symlinks
      run: |
        # Ստեղծում ենք սիմվոլիկ հղումներ, որպեսզի քո Makefile-ի CROSS_COMPILE-ը աշխատի առանց փոփոխության
        sudo ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-elf-gcc
        sudo ln -sf /usr/bin/x86_64-linux-gnu-ld /usr/bin/x86_64-elf-ld
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objcopy /usr/bin/x86_64-elf-objcopy
        sudo ln -sf /usr/bin/x86_64-linux-gnu-objdump /usr/bin/x86_64-elf-objdump
        sudo ln -sf /usr/bin/x86_64-linux-gnu-as /usr/bin/x86_64-elf-as
        sudo ln -sf /usr/bin/x86_64-linux-gnu-strip /usr/bin/x86_64-elf-strip

    - name: Compile CellKernel OS
      run: |
        make clean
        make

    - name: Check Build Artifacts
      run: |
        if [ -d build/ ]; then
          echo "Build directory exists"
          ls -la build/
        else
          echo "Build directory not found"
          exit 1
        fi

    - name: Upload Output Binaries
      uses: actions/upload-artifact@v4
      with:
        name: cellkernel-build-output
        path: build/
        retention-days: 30

    - name: Build Status
      if: success()
      run: echo "✅ Build completed successfully!"

    - name: Build Failed
      if: failure()
      run: echo "❌ Build failed. Check logs above."
