name: Build CellKernel OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools & Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y make nasm grub-pc-bin xorriso gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu python3

    - name: Create x86_64-elf Symlinks
      run: |
        sudo ln -s /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-elf-gcc
        sudo ln -s /usr/bin/x86_64-linux-gnu-ld /usr/bin/x86_64-elf-ld
        sudo ln -s /usr/bin/x86_64-linux-gnu-objcopy /usr/bin/x86_64-elf-objcopy
        sudo ln -s /usr/bin/x86_64-linux-gnu-objdump /usr/bin/x86_64-elf-objdump
        sudo ln -s /usr/bin/x86_64-linux-gnu-as /usr/bin/x86_64-elf-as
        sudo ln -s /usr/bin/x86_64-linux-gnu-strip /usr/bin/x86_64-elf-strip

    - name: Smart-Fix Inline Assembly via Python
      run: |
        python3 -c '
        import re

        filepath = "kernel/core/interrupts.c"
        with open(filepath, "r") as f:
            content = f.read()

        # Գտնում ենք interrupt_controller_init ֆունկցիան և դրա ներսի __asm__ բլոկը
        def fix_asm(match):
            asm_block = match.group(0)
            # Փոխարինում ենք միայն այն % նշանները, որոնց հաջորդում է տառ կամ թիվ, բայց արդեն կրկնապատկված չեն
            fixed = re.sub(r"(?<!%)%([a-zA-Z0-9]+)", r"%%\1", asm_block)
            return fixed

        # Կիրառում ենք ֆիլտրը հատուկ __asm__ volatile բլոկների վրա
        new_content = re.sub(r"__asm__\s+volatile\s*\([^)]+\);", fix_asm, content, flags=re.DOTALL)

        with open(filepath, "w") as f:
            f.write(new_content)
        print("[+] Inline Assembly formatted successfully for GCC.")
        '

    - name: Compile CellKernel OS
      run: |
        make clean
        # Վերադառնում ենք քո սկզբնական խիստ C11 ստանդարտին, քանի որ կոդն արդեն ավտոմատ ուղղված է
        make CFLAGS="-Wall -Wextra -Wno-error -std=c11 -ffreestanding -fno-stack-protector -fno-builtin -fno-pie -O2 -g -Ikernel/include -march=x86-64 -mno-red-zone -mno-mmx -mno-sse -mno-sse2"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cellkernel-build-output
        path: build/
